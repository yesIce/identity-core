name: IdentityCore
version: ${version}
main: com.wiceh.identitycore.IdentityCorePlugin
api-version: 1.13
authors: [wIceh]
soft-depend: [LuckPerms]
description: Identity management for cracked servers

load: STARTUP
commands:
  identity:
    description: Gestione identità giocatori
    permission: identitycore.identity.info
    usage: /identity <info|history> [nome]

permissions:
  identitycore.identity.info:
    description: Permette di vedere le info identità
    default: op
  identitycore.identity.transfer:
    description: Permette di trasferire identità tra account
    default: op